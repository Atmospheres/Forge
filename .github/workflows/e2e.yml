name: E2E

# Runs against the real stack (real Auth0 login, a real backend, a fresh
# Postgres) -- slower and more prone to flakiness (Auth0's hosted login page
# in a headless browser) than the unit-test CI, so this doesn't gate every
# push. Scheduled nightly, plus on-demand via the Actions tab.
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch: {}

jobs:
  e2e:
    name: E2E (real Auth0, real backend, real Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: forge
          POSTGRES_PASSWORD: forge
          POSTGRES_DB: forge_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Start backend
        working-directory: backend
        env:
          # The service container is reachable at localhost inside the job.
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/forge_e2e
          AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN }}
          AUTH0_AUDIENCE: ${{ secrets.AUTH0_AUDIENCE }}
        run: |
          nohup ./mvnw spring-boot:run > /tmp/backend.log 2>&1 &
          timeout 90 bash -c 'until curl -sf http://localhost:8080/actuator/health >/dev/null; do sleep 2; done'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: frontend
        env:
          VITE_AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN }}
          VITE_AUTH0_AUDIENCE: ${{ secrets.AUTH0_AUDIENCE }}
          VITE_AUTH0_CLIENT_ID: ${{ secrets.VITE_AUTH0_CLIENT_ID }}
          VITE_API_BASE_URL: http://localhost:8080
          E2E_AUTH0_EMAIL: ${{ secrets.E2E_AUTH0_EMAIL }}
          E2E_AUTH0_PASSWORD: ${{ secrets.E2E_AUTH0_PASSWORD }}
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload backend log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-log
          path: /tmp/backend.log
          retention-days: 14
          if-no-files-found: ignore
