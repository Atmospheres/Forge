<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forge</title>
    <script>
      // Set the theme class before first paint so there's no flash of the
      // wrong theme -- ThemeProvider (src/theme.tsx) reads/writes the same
      // localStorage key and takes over from here once React mounts.
      (function () {
        var stored = localStorage.getItem('forge-theme');
        var dark = stored ? stored === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.classList.toggle('dark', dark);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
