spring:
  config:
    import: "optional:file:.env[.properties]"
    
  application:
    name: forge-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/forge
    username: forge
    password: forge

  jpa:
    hibernate:
      ddl-auto: validate # Flyway owns the schema, Hibernate just validates against it
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://${AUTH0_DOMAIN}/
          # audience is validated separately via a custom JwtDecoder validator, see SecurityConfig

forge:
  auth0:
    audience: ${AUTH0_AUDIENCE}
  cors:
    # Comma-separated list of origins allowed to call this API. Defaults to the local
    # frontend dev server; override with FORGE_CORS_ALLOWED_ORIGINS in any real deployment,
    # or the browser will just get CORS errors talking to a non-localhost frontend.
    allowed-origins: http://localhost:5173
  rate-limit:
    # Token bucket per authenticated user (JWT sub) or, for unauthenticated
    # requests, per IP. Burst up to capacity, sustained rate is refill-tokens
    # per refill-period-seconds.
    capacity: 120
    refill-tokens: 120
    refill-period-seconds: 60

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html
